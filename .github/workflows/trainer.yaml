name: Train AI-AGENT Tiny Model

on:
  workflow_dispatch:
    inputs:
      steps:
        description: "Training steps"
        required: false
        default: "500"
  push:
    branches: [main]
    paths:
      - "data/**"
      - "train.py"
      - "model/**"
      - "tokenizer/**"
      - ".github/workflows/trainer.yaml"

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: python train.py --steps "${{ github.event.inputs.steps || '500' }}" --batch-size 16 --n-embd 96 --n-layer 3 --n-head 4

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-agent-model-artifacts
          path: |
            artifacts/model.pt
            artifacts/bpe.pkl
          if-no-files-found: error
          retention-days: 30

      - name: Commit updated small artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f artifacts/bpe.pkl artifacts/model.pt python-service/artifacts/bpe.pkl python-service/artifacts/model.pt
          git diff --staged --quiet || git commit -m "Update trained tiny model artifacts"
          git push
        continue-on-error: true
