name: Train AI-AGENT Model

on:
  workflow_dispatch:  # Manual trigger (recommended)
  push:
    branches:
      - main
    paths:
      - 'data/**'          # Only trigger if training data changes
      - 'train.py'
      - 'model/**'
      - 'tokenizer/**'
      - '.github/workflows/train.yml'

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: python-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python-service/requirements.txt numpy

      - name: Create directories
        run: mkdir -p data artifacts

      - name: Run Training
        run: python train.py
        env:
          TRAINING_STEPS: 3500   # You can adjust this

      - name: Upload Model Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

      - name: Commit and Push Updated Artifacts (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f artifacts/
          git diff --staged --quiet || git commit -m "Update trained model artifacts [automated]"
          git push
        continue-on-error: true

      - name: Training Complete
        run: echo "🎉 Model training completed successfully!"
