name: Pylint - Code Quality

on:
  push:
    branches:
      - main
    paths:
      - '**.py'                    # Only run when Python files change
      - '.pylintrc'
      - '.github/workflows/pylint.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:               # Allow manual trigger

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: python-service/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f python-service/requirements-dev.txt ]; then
            pip install -r python-service/requirements-dev.txt
          else
            pip install pylint
          fi

      - name: Run Pylint
        run: |
          pylint --rcfile=.pylintrc \
            tokenizer/ \
            model/ \
            server/ \
            python-service/ \
            train.py \
            --fail-under=6.0 || echo "Pylint completed with some warnings (not failing CI)"
        continue-on-error: true   # Don't block PRs for minor issues

      - name: Summary
        run: echo "✅ Pylint analysis completed!"
