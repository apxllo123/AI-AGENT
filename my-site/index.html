<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-AGENT</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f5f5;
      color: #111;
      font-family: Arial, sans-serif;
    }

    #ui {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }

    .o-container {
      width: min(100%, 1100px);
      margin: 0 auto;
    }

    .panel {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 24px;
      margin-top: 20px;
      box-shadow: 0 6px 24px rgba(0,0,0,.08);
    }

    h1, h2, p {
      margin: 0 0 12px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="o-container">
      <h1>AI-AGENT</h1>
      <p>Your AI assistant is live.</p>

      <div class="panel">
        <h2>Chat</h2>
        <p>If you can see this text, the page is working.</p>
      </div>
    </div>
  </div>
</body>
</html>
