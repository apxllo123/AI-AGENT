<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-AGENT</title>
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/header.css" />
  <link rel="stylesheet" href="./css/hero.css" />
  <link rel="stylesheet" href="./css/cta.css" />
  <link rel="stylesheet" href="./css/chat.css" />
  <link rel="stylesheet" href="./css/responsive.css" />
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="ui">
    <header id="site-header">
      <div id="site-header__container">
        <a id="site-header__logo" href="/">
          <span class="o-icon">◆</span>
          <span>AI-AGENT</span>
        </a>

        <nav id="site-header__nav">
          <ul id="site-header__nav-list-01">
            <li class="site-header__nav-item"><a href="#home-hero">Home</a></li>
            <li class="site-header__nav-item"><a href="#home-cta">CTA</a></li>
            <li class="site-header__nav-item"><a href="#chat-panel">Chat</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section id="home-hero">
        <div id="home-hero__wrapper" class="o-container">
          <div id="home-hero__top">
            <a id="home-hero__new-badge" href="#" aria-label="New announcement">
              <span id="home-hero__new-badge-tag">New</span>
              <span>Introducing AI-AGENT</span>
            </a>

            <h1 id="home-hero__title">AI-AGENT Your AI assistant is live.</h1>
          </div>

          <figure id="home-hero__media">
            <img src="https://via.placeholder.com/1200x700" alt="Preview" />
          </figure>
        </div>
      </section>

      <section id="home-cta" class="o-container">
        <div id="home-cta__copy">
          <p id="home-cta__caption">Chat</p>
          <h2 id="home-cta__title">If you can see this text, the page is working.</h2>
        </div>

        <a id="home-cta__button" href="#" aria-label="Start chat">Start Chat</a>

        <div class="logo-grid-wrapper">
          <div class="logo-grid">
            <div class="logo-grid-item"><span class="o-icon">A</span></div>
            <div class="logo-grid-item"><span class="o-icon">I</span></div>
            <div class="logo-grid-item"><span class="o-icon">-</span></div>
            <div class="logo-grid-item"><span class="o-icon">G</span></div>
          </div>
        </div>
      </section>

      <section id="chat-panel" class="o-container" style="display:none;">
        <div id="chat-shell">
          <div id="chat-messages" aria-live="polite"></div>

          <form id="chat-form">
            <input id="chat-input" type="text" placeholder="Type a message..." autocomplete="off" />
            <button type="submit">Send</button>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script src="./js/chat.js" defer></script>
</body>
</html>
