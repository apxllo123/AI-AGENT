<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/jarvis.css" />
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div id="app">
    <header id="hdr">
      <div id="hdr-left">
        <div id="logo-ring"></div>
        <span id="logo-text">J.A.R.V.I.S</span>
      </div>
      <div id="hdr-right">
        <span id="status-dot"></span>
        <span id="status-text">ONLINE</span>
        <span id="model-badge">llama3</span>
      </div>
    </header>

    <main id="chat-main">
      <div id="chat-messages"></div>
      <div id="typing-indicator" style="display:none">
        <span></span><span></span><span></span>
      </div>
    </main>

    <footer id="chat-footer">
      <div id="input-row">
        <input id="chat-input" type="text" placeholder="Enter command…" autocomplete="off" autofocus />
        <button id="send-btn" aria-label="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div id="footer-meta">
        <span id="memory-status">Memory active</span>
        <button id="clear-memory-btn">Clear Memory</button>
      </div>
    </footer>
  </div>

  <script src="./js/chat.js"></script>
</body>
</html>
