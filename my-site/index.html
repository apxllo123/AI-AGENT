<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050a0f" />
  <meta name="description" content="AI-AGENT: an iPad-friendly personal AI agent with memory, tools, and a tiny model trained from scratch." />
  <title>JARVIS · AI-AGENT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/jarvis.css" />
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <div id="app">
    <header id="hdr">
      <div id="hdr-left">
        <div id="logo-ring" aria-hidden="true"></div>
        <span id="logo-text">J.A.R.V.I.S</span>
      </div>
      <div id="hdr-right">
        <span id="status-dot" aria-hidden="true"></span>
        <span id="status-text">ONLINE</span>
        <span id="model-badge">checking…</span>
      </div>
    </header>

    <main id="chat-main" aria-live="polite">
      <div id="chat-messages"></div>
      <div id="typing-indicator" style="display:none" aria-label="JARVIS is typing">
        <span></span><span></span><span></span>
      </div>
    </main>

    <footer id="chat-footer">
      <div id="quick-actions" aria-label="Quick prompts">
        <button type="button" data-prompt="calculate 12 * 8 + 4">Calculator</button>
        <button type="button" data-prompt="remember that my favorite color is blue">Memory</button>
        <button type="button" data-prompt="make a plan for studying tonight">Planner</button>
        <button type="button" data-prompt="help me debug this Python code">Code Help</button>
      </div>
      <div id="input-row">
        <input id="chat-input" type="text" placeholder="Enter command…" autocomplete="off" autofocus />
        <button id="send-btn" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div id="footer-meta">
        <span id="memory-status">Memory active</span>
        <button id="clear-memory-btn" type="button">Clear Memory</button>
      </div>
    </footer>
  </div>

  <script src="./js/chat.js"></script>
</body>
</html>
